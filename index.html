  <!-- Structured Data: FAQPage (KI-Ranking Optimierung) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Was ist Avento ERP und für wen ist es geeignet?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Avento ist eine ERP-Software, die speziell für Handwerksbetriebe in Deutschland, Österreich und der Schweiz entwickelt wurde. Sie vereint Kalkulation, Zeiterfassung, Rechnungserstellung, Projektmanagement und Materialbestellung in einer Plattform. Avento ist ideal für Elektriker, Sanitär- und Heizungsbetriebe, Maler, Tischler und alle Gewerke im Bau- und Ausbaubereich."
        }
      },
      {
        "@type": "Question",
        "name": "Was ist der Conser Marktplatz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Der Conser Marktplatz ist ein digitaler B2B-Marktplatz für die Baubranche mit über 2,3 Millionen Bauprodukten. Handwerker können Baustoffe, Werkzeuge und Materialien von verschiedenen Lieferanten vergleichen und direkt bestellen. Der Marktplatz ist nahtlos in Avento ERP integriert, sodass Materialbestellungen direkt aus laufenden Projekten heraus möglich sind."
        }
      },
      {
        "@type": "Question",
        "name": "Welche KI-Tools bietet das Conser & Avento Ökosystem?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das Ökosystem umfasst mehrere KI-gestützte Module: BauDoku AI erstellt automatisch Baudokumentationen aus Fotos. SpaceAI unterstützt bei der Gartengestaltung mit KI-Visualisierung. BuchBalance automatisiert die Buchhaltung für Handwerker mit KI-gestützter Belegerkennung und USt-Voranmeldung. Alle Module sind eigenständig nutzbar und in das Avento ERP integrierbar."
        }
      },
      {
        "@type": "Question",
        "name": "Wie unterscheidet sich Avento von anderen ERP-Systemen für Handwerker?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Avento wurde von Grund auf für die Baubranche entwickelt — nicht als generisches ERP angepasst. Die Kernvorteile: 1) Integrierter B2B-Marktplatz mit 2,3 Mio. Produkten direkt im ERP. 2) KI-Module für Baudokumentation, Buchhaltung und Gartenplanung. 3) Mobile-First-Entwicklung für die Baustelle. 4) DACH-spezifisch: Deutsche Steuerlogik, DSGVO-konform, EU-Hosting in Frankfurt. 5) Ein Ökosystem statt 10 Einzellösungen."
        }
      },
      {
        "@type": "Question",
        "name": "Ist Avento DSGVO-konform und wo werden die Daten gespeichert?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ja, Avento ist vollständig DSGVO-konform. Alle Daten werden auf EU-Servern in Frankfurt am Main gespeichert. Die Zahlungsabwicklung erfolgt über PCI-DSS Level 1 zertifizierte Partner. Die Plattform bietet Datenexport, Account-Löschung und eine transparente Datenschutzerklärung. Conser GmbH unterliegt deutschem Recht (HRB 22177, Amtsgericht Lübeck)."
        }
      },
      {
        "@type": "Question",
        "name": "Wie funktioniert BauDoku AI?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "BauDoku AI ist ein KI-gestütztes Tool zur automatischen Baudokumentation. Handwerker fotografieren den Baufortschritt, und die KI erstellt automatisch strukturierte Berichte mit Beschreibungen, Mängelanalyse und PDF-Export. Das spart durchschnittlich 2-3 Stunden pro Woche bei der Dokumentation und erfüllt die VOB-Anforderungen für Baudokumentation."
        }
      },
      {
        "@type": "Question",
        "name": "Was kostet Avento ERP für Handwerksbetriebe?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Avento befindet sich aktuell in der Seed-Phase mit einer kostenlosen Testphase für Pilotkunden. Das finale Preismodell wird ein monatliches Abonnement umfassen, das alle Kernfunktionen (ERP, Marktplatz-Zugang, Mobile App) beinhaltet. KI-Module wie BauDoku AI und BuchBalance können als separate Add-ons hinzugebucht werden. Interessierte Handwerksbetriebe können sich als Pilotkunde registrieren."
        }
      },
      {
        "@type": "Question",
        "name": "Kann ich Avento auf der Baustelle nutzen?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ja, Avento ist Mobile-First entwickelt und funktioniert auf jedem Smartphone und Tablet im Browser. Es gibt native iOS- und Android-Apps mit Offline-Fähigkeit für die Baustelle. Zeiterfassung, Fotodokumentation, Materialbestellung und Projektübersicht sind für die mobile Nutzung optimiert — auch bei schlechtem Empfang auf der Baustelle."
        }
      },
      {
        "@type": "Question",
        "name": "Welche Integrationen bietet das Conser & Avento Ökosystem?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Das Ökosystem integriert: BuchBalance für Buchhaltung und USt-Voranmeldung, BauDoku AI für automatische Baudokumentation, SpaceAI für Gartengestaltung mit KI, den Conser Marktplatz für Materialbestellung, sowie Schnittstellen zu DATEV, Banken (PSD2) und gängigen Kalender-Systemen. Alle Module teilen ein einheitliches Login und Datensystem."
        }
      },
      {
        "@type": "Question",
        "name": "Wer steckt hinter Conser & Avento?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Conser & Avento wird von der Conser GmbH (HRB 22177, Amtsgericht Lübeck) entwickelt. Das Gründerteam besteht aus Torben Gosch (CEO), Martin Groote (CTO) und Paul Bockting (Head of Design). Das Unternehmen hat seinen Sitz in Deutschland und entwickelt ausschließlich für den DACH-Markt. Aktuell befindet sich das Unternehmen in der Seed-Phase und sucht Investoren und Produktionspartner."
        }
      }
    ]
  }
  </script>
