<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Hintergrund-Gradient: Dunkles Teal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A3D3D"/>
      <stop offset="100%" stop-color="#0C2E2E"/>
    </linearGradient>

    <!-- Diagonal-Gradient: Avento Teal → Conser Orange -->
    <linearGradient id="tealToOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ECDC4"/>
      <stop offset="50%" stop-color="#C4875A"/>
      <stop offset="100%" stop-color="#E8945A"/>
    </linearGradient>

    <!-- Individuelle Blatt-Gradients für mehr Tiefe -->
    <linearGradient id="leafTL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ED4CB"/>
      <stop offset="100%" stop-color="#3DBDB4"/>
    </linearGradient>

    <linearGradient id="leafTR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DBDB4"/>
      <stop offset="100%" stop-color="#C4875A"/>
    </linearGradient>

    <linearGradient id="leafBL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BBFB6"/>
      <stop offset="100%" stop-color="#D4915A"/>
    </linearGradient>

    <linearGradient id="leafBR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4915A"/>
      <stop offset="100%" stop-color="#E8A06A"/>
    </linearGradient>

    <!-- Subtiler Glanz-Overlay -->
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- App-Icon Hintergrund (iOS-Style abgerundetes Quadrat) -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- 4-Blatt-Symbol zentriert -->
  <g transform="translate(512, 512) scale(2.8)">
    <!-- Oben-Links: Blatt (Teal - Avento) -->
    <path d="M-12,-12 L-12,-58 C-12,-83 -33,-104 -58,-104 L-104,-104 C-104,-104 -104,-58 -104,-58 C-104,-33 -83,-12 -58,-12 Z"
          fill="url(#leafTL)" transform="translate(0,0)"/>

    <!-- Oben-Rechts: Blatt (Teal→Orange Übergang) -->
    <path d="M12,-12 L58,-12 C83,-12 104,-33 104,-58 L104,-104 C104,-104 58,-104 58,-104 C33,-104 12,-83 12,-58 Z"
          fill="url(#leafTR)"/>

    <!-- Unten-Links: Blatt (Teal→Orange Übergang) -->
    <path d="M-12,12 L-58,12 C-83,12 -104,33 -104,58 L-104,104 C-104,104 -58,104 -58,104 C-33,104 -12,83 -12,58 Z"
          fill="url(#leafBL)"/>

    <!-- Unten-Rechts: Blatt (Orange - Conser) -->
    <path d="M12,12 L12,58 C12,83 33,104 58,104 L104,104 C104,104 104,58 104,58 C104,33 83,12 58,12 Z"
          fill="url(#leafBR)"/>
  </g>

  <!-- Glanz-Overlay -->
  <rect width="1024" height="1024" rx="224" fill="url(#shine)"/>
</svg>